name: Deploy CML

on:
  workflow_dispatch:

jobs:
  deploy-cml:
    runs-on: ubuntu-latest
    env:
      TARGET_ORG_ALIAS: target-org

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate target org
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          if [ -z "$SFDX_AUTH_URL" ]; then
            echo "Missing required GitHub secret: SFDX_AUTH_URL"
            exit 1
          fi
          printf '%s' "$SFDX_AUTH_URL" > .sfdx-auth-url
          sf org login sfdx-url --sfdx-url-file .sfdx-auth-url --alias "$TARGET_ORG_ALIAS" --set-default
          rm -f .sfdx-auth-url

      - name: Preflight checks
        run: |
          test -f cml/cml-manifest.txt || (echo "Missing cml/cml-manifest.txt" && exit 1)
          sf org display --target-org "$TARGET_ORG_ALIAS"

      - name: Deploy CML from manifest
        run: npx rccml deploy --manifest cml/cml-manifest.txt --target-org "$TARGET_ORG_ALIAS" --no-telemetry
